  docker.image: "<< config(docker.image)|join("") >>"

  actionlint.enabled: << config(actionlint.enabled)|join("") >>

  hadolint.enabled: << config(hadolint.enabled)|join("") >>
  hadolint.failure_threshold: "<< config(hadolint.failure_threshold)|join("") >>"
