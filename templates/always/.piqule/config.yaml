# Generated by piqule sync. Shows all available keys and their current values.
# Copy any key into .piqule.yaml under "override" or "append" to customize.
#
# Example .piqule.yaml:
#
#     override:
#         phpstan.level: 8
#     append:
#         exclude:
#             - legacy

defaults:
  php.src: [<< config(php.src)|format_each('"%s"')|join(", ") >>]
  exclude: [<< config(exclude)|format_each('"%s"')|join(", ") >>]
  php.versions: [<< config(php.versions)|format_each('"%s"')|join(", ") >>]

  ci.piqule_bin: "<< config(ci.piqule_bin)|join("") >>"
