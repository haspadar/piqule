coverage:
  status:
    project:
      default:
        target: << config(coverage.project.target)|default_scalar("80%") >>
        threshold: << config(coverage.project.threshold)|default_scalar("2%") >>

    patch:
      default:
        target: << config(coverage.patch.target)|default_scalar("80%") >>
        threshold: << config(coverage.patch.threshold)|default_scalar("5%") >>

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: false
