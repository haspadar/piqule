# Typos configuration
# Docs: https://github.com/crate-ci/typos

[default]
binary = false
extend-ignore-re = [
<< config(typos.ignore_re)|default_list(["vendor/.*"])|format_each('    "%s",')|join("\n") >>
]

[files]
extend-exclude = [
<< config(typos.exclude)|default_list([".git/","vendor/","node_modules/"])|format_each('    "%s",')|join("\n") >>
]
