# Hadolint configuration (Piqule managed)

failure-threshold: << config(hadolint.failure_threshold)|default_list(["error"])|scalar >>

ignored: << config(hadolint.ignored_yaml)|default_list(["[]"])|scalar >>

override:
  error: << config(hadolint.override.error_yaml)|default_list(["[]"])|scalar >>
  warning: << config(hadolint.override.warning_yaml)|default_list(["[]"])|scalar >>
