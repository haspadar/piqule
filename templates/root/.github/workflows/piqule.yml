name: Piqule

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ============================================================
  # PR SIZE CHECK
  # ============================================================
  pr_size:
    name: PR Size
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - uses: maidsafe/pr_size_checker@fa5820312a361f3f51aad2d3d9cb941d9e1d27db
        with:
          max_lines_changed: 250


  # ============================================================
  # INFRA CHECKS (Docker runtime)
  # ============================================================
  infra:
    name: ${{ matrix.check }} (infra)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        check:
          - actionlint
          - hadolint
          - markdownlint
          - yamllint
          - typos
          - shellcheck
          - jsonlint

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build infra image
        run: docker buildx build -t piqule-infra:local --load .

      - name: Run check
        run: bin/piqule check ${{ matrix.check }}


  # ============================================================
  # PHP STATIC ANALYSIS
  # ============================================================
  php-static:
    name: ${{ matrix.check }} (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        php: [<< config(ci.php.matrix)|default(["8.3"])|format('"%s"')|join(", ") >>]
        check:
          - phpcs
          - phpstan
          - psalm
          - phpmd
          - phpmetrics

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, json

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run static check
        run: bin/piqule check ${{ matrix.check }}


  # ============================================================
  # PHP TESTS + COVERAGE + MUTATION
  # ============================================================
  php-tests:
    name: Tests / Coverage / Mutation (PHP 8.3)
    runs-on: ubuntu-latest
    needs: php-static
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1
        with:
          php-version: << config(ci.php.test_version)|default(["8.3"])|join("") >>
          coverage: xdebug
          extensions: mbstring, dom, json

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # ------------------------------------------------------------
      # PHPUnit (if config exists)
      # ------------------------------------------------------------
      - name: PHPUnit (coverage)
        if: hashFiles('.piqule/phpunit/phpunit.xml') != ''
        run: |
          XDEBUG_MODE=coverage \
          php -d memory_limit=1G \
          vendor/bin/phpunit \
            -c .piqule/phpunit/phpunit.xml \
            --coverage-clover=.piqule/codecov/coverage.xml

      # ------------------------------------------------------------
      # Upload coverage to Codecov (if coverage exists)
      # ------------------------------------------------------------
      - name: Upload coverage
        if: hashFiles('.piqule/codecov/coverage.xml') != ''
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: .piqule/codecov/coverage.xml
          codecov_yml_path: .piqule/codecov/.codecov.yml
          fail_ci_if_error: true

      # ------------------------------------------------------------
      # Infection (if config exists)
      # ------------------------------------------------------------
      - name: Infection
        if: hashFiles('.piqule/infection/infection.json5') != ''
        env:
          INFECTION_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
        run: |
          XDEBUG_MODE=coverage \
          php -d memory_limit=1G \
          vendor/bin/infection \
            --configuration=.piqule/infection/infection.json5 \
            --threads=max
