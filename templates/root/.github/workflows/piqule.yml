name: Piqule

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ============================================================
  # Infra checks (Docker runtime only)
  # ============================================================
  piqule-infra:
    name: ${{ matrix.check }} (infra)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        check:
          - actionlint
          - hadolint
          - markdownlint
          - yamllint
          - typos
          - shellcheck
          - jsonlint

    steps:
      # ------------------------------------------------------------
      # Checkout repository
      # ------------------------------------------------------------
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # ------------------------------------------------------------
      # Build local infra image
      # ------------------------------------------------------------
      - run: docker buildx build -t piqule-infra:local --load .

      # ------------------------------------------------------------
      # Sync configuration
      # ------------------------------------------------------------
      - run: << config(ci.piqule_bin)|default(["vendor/bin/piqule"])|scalar >> sync

      # ------------------------------------------------------------
      # Run selected check
      # ------------------------------------------------------------
      - run: << config(ci.piqule_bin)|default(["vendor/bin/piqule"])|scalar >> check ${{ matrix.check }}

  # ============================================================
  # PHP checks (Composer runtime + PHP matrix)
  # ============================================================
  piqule-php:
    name: ${{ matrix.check }} (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [<< config(ci.php.matrix)|default(["8.3"])|format('"%s"')|join(", ") >>]
        check:
          - phpcs
          - phpstan
          - psalm
          - phpmd
          - phpmetrics
          - phpunit
          - infection

    steps:
      # ------------------------------------------------------------
      # Checkout repository
      # ------------------------------------------------------------
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # ------------------------------------------------------------
      # Setup PHP
      # ------------------------------------------------------------
      - uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug

      # ------------------------------------------------------------
      # Install dependencies
      # ------------------------------------------------------------
      - run: composer install --no-interaction --no-progress

      # ------------------------------------------------------------
      # Run selected check
      # ------------------------------------------------------------
      - run: << config(ci.piqule_bin)|default(["vendor/bin/piqule"])|scalar >> check ${{ matrix.check }}
