name: Build Piqule Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ["8.3", "8.4", "8.5"]

    steps:
      # ------------------------------------------------------------
      # Checkout repository
      # ------------------------------------------------------------
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # ------------------------------------------------------------
      # Set up Docker Buildx
      # ------------------------------------------------------------
      - uses: docker/setup-buildx-action@f95db51c1c5eaa2bfb0f2e0dfc7c3e2ad1b60b1a  # v3.3.0

      # ------------------------------------------------------------
      # Login to GHCR
      # ------------------------------------------------------------
      - uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289a1c7c9  # v3.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------
      # Build and push image
      # ------------------------------------------------------------
      - uses: docker/build-push-action@3b5e8027fcad23fda98b88c1b87cfa8a3d3a94a4  # v5.3.0
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            PHP_VERSION=${{ matrix.php }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/piqule:${{ matrix.php }}
