name: Piqule

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  piqule:
    name: ${{ matrix.check }} (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]
        check:
          - actionlint
          - hadolint
          - markdownlint
          - yamllint
          - typos
          - shellcheck
          - jsonlint
          - phpcs
          - phpstan
          - psalm
          - phpmd
          - phpmetrics
          - phpunit
          - infection

    steps:
      # ------------------------------------------------------------
      # Checkout repository
      # ------------------------------------------------------------
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # ------------------------------------------------------------
      # Setup PHP
      # ------------------------------------------------------------
      - uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug

      # ------------------------------------------------------------
      # Install dependencies
      # ------------------------------------------------------------
      - run: composer install --no-interaction --no-progress

      # ------------------------------------------------------------
      # Build local infra image
      # ------------------------------------------------------------
      - run: docker buildx build -t piqule-infra:local --load .

      # ------------------------------------------------------------
      # Sync configuration
      # ------------------------------------------------------------
      - run: bin/piqule sync

      # ------------------------------------------------------------
      # Run selected check
      # ------------------------------------------------------------
      - run: bin/piqule check ${{ matrix.check }}
