name: Piqule

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ============================================================
  # Infra checks (Docker runtime only)
  # ============================================================
  piqule-infra:
    name: ${{ matrix.check }} (infra)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        check:
          - actionlint
          - hadolint
          - markdownlint
          - yamllint
          - typos
          - shellcheck
          - jsonlint

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - run: docker buildx build -t piqule-infra:local --load .

      - run: bin/piqule check ${{ matrix.check }}

  # ============================================================
  # PHP checks (Composer runtime + PHP matrix)
  # ============================================================
  piqule-php:
    name: ${{ matrix.check }} (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]
        check:
          - phpcs
          - phpstan
          - psalm
          - phpmd
          - phpmetrics
          - phpunit
          - infection

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug

      - run: composer install --no-interaction --no-progress

      - run: bin/piqule check ${{ matrix.check }}
