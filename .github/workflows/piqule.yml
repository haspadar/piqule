name: Piqule

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  piqule:
    name: ${{ matrix.check }} (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]
        check:
          - actionlint
          - hadolint
          - markdownlint
          - yamllint
          - typos
          - shellcheck
          - jsonlint
          - phpcs
          - phpstan
          - psalm
          - phpmd
          - phpmetrics
          - phpunit
          - infection

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run ${{ matrix.check }}
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/project" \
            -w /project \
            ghcr.io/${{ github.repository_owner }}/piqule:${{ matrix.php }} \
            check ${{ matrix.check }}
